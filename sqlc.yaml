version: "2"
sql:
  - schema: "database/migrations/"      # Mencari file .sql hasil migrasi
    queries: "database/queries/"       # Mencari file users.sql dkk
    engine: "postgresql"
    gen:
      go:
        package: "db"                  # Nama package saat di-import (internal/db)
        out: "internal/db"             # Folder tujuan hasil generate
        sql_package: "pgx/v5"          # Menggunakan driver pgx v5
        emit_json_tags: true           # Menambahkan tag JSON pada struct
        emit_interface: true           # Penting untuk Mocking/Testing nanti
        emit_db_tags: true             # Berguna jika butuh mapping db manual
        emit_prepared_queries: false   # Biasanya dimatikan untuk aplikasi web modern

  - schema: "database/blueprints/tenant_blueprint.sql"
    queries: "database/tenant_queries"
    engine: "postgresql"
    gen:
      go:
        package: "tenantdb"
        out: "internal/tenantdb"